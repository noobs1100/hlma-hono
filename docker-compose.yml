services:
  db:
    image: postgres:16-alpine
    container_name: hlma-hono-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hlma
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hlma"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: